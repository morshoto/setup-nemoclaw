name: Publish

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            version:
                description: 'Version tag to publish, for example v0.1.0'
                required: true
                type: string
            ref:
                description: 'Git ref to build from'
                required: false
                default: ''
                type: string

permissions:
    contents: write

jobs:
    build:
        name: Build release artifacts
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - goos: darwin
                      goarch: arm64
                    - goos: linux
                      goarch: amd64
        env:
            VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
            BUILD_REF: ${{ github.event_name == 'workflow_dispatch' && (inputs.ref || inputs.version) || github.ref_name }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ env.BUILD_REF }}

            - name: Set up Go
              id: setup-go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: false

            - name: Cache Go build artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/go-build
                      ~/go/pkg/mod
                  key: go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}-publish-${{ matrix.goos }}-${{ matrix.goarch }}
                  restore-keys: |
                      go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}-
                      go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-

            - name: Build binary
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p dist
                  artifact="openclaw_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
                  build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  commit_sha="$(git rev-parse HEAD)"
                  GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
                    go build -trimpath \
                    -ldflags "-s -w -X openclaw/internal/app.Version=${VERSION} -X openclaw/internal/app.CommitSHA=${commit_sha} -X openclaw/internal/app.BuildDate=${build_date}" \
                    -o "dist/${artifact}" ./cmd/openclaw
                  chmod +x "dist/${artifact}"

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: openclaw-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: dist/openclaw_${{ env.VERSION }}_${{ matrix.goos }}_${{ matrix.goarch }}
                  if-no-files-found: error

    release:
        name: Create draft release
        runs-on: ubuntu-latest
        needs: build
        env:
            VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.event_name == 'workflow_dispatch' && (inputs.ref || inputs.version) || github.ref_name }}

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Generate release notes and metadata
              shell: bash
              run: |
                  set -euo pipefail

                  commit_sha="$(git rev-parse HEAD)"
                  build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  previous_tag="$(git tag --sort=-creatordate | grep -Fxv "${VERSION}" | head -n 1 || true)"

                  if [[ -n "${previous_tag}" ]]; then
                    changelog_range="${previous_tag}..${VERSION}"
                  else
                    changelog_range="${VERSION}"
                  fi

                  {
                    echo "# ${VERSION}"
                    echo
                    echo "## Changelog"
                    if git rev-parse "${VERSION}" >/dev/null 2>&1; then
                      git log --no-merges --pretty=format:'- %s (%h)' "${changelog_range}" || true
                    fi
                    echo
                    echo
                    echo "## Checksums"
                    find artifacts -type f -maxdepth 2 -name 'openclaw_*' -print0 | sort -z | xargs -0 sha256sum > checksums.txt
                    cat checksums.txt
                    echo
                  } > release-notes.md

                  jq -n \
                    --arg version "${VERSION}" \
                    --arg commit "${commit_sha}" \
                    --arg build_date "${build_date}" \
                    --arg tag "${VERSION}" \
                    --rawfile checksums checksums.txt \
                    '{
                      version: $version,
                      tag: $tag,
                      commit: $commit,
                      build_date: $build_date,
                      draft: true,
                      checksums: $checksums
                    }' > release-metadata.json

            - name: Create draft GitHub release
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  assets=(
                    artifacts/*/*
                    checksums.txt
                    release-metadata.json
                  )

                  gh release create "${VERSION}" \
                    --draft \
                    --verify-tag \
                    --title "${VERSION}" \
                    --notes-file release-notes.md \
                    "${assets[@]}"

            - name: Publish summary
              shell: bash
              run: |
                  {
                    echo "## Publish"
                    echo
                    echo "- version: ${VERSION}"
                    echo "- draft release created"
                    echo "- assets: openclaw_${VERSION}_darwin_arm64, openclaw_${VERSION}_linux_amd64, checksums.txt, release-metadata.json"
                  } >> "${GITHUB_STEP_SUMMARY}"
