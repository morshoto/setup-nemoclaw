name: CLI CI

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              id: setup-go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: false

            - name: Cache Go build artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/go-build
                      ~/go/pkg/mod
                  key: go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}-build
                  restore-keys: |
                      go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}-
                      go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-

            - name: Build
              run: go build ./cmd/openclaw

    lint:
        name: Lint
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              id: setup-go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: false

            - name: Cache Go build artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/go-build
                      ~/go/pkg/mod
                  key: go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}-lint
                  restore-keys: |
                      go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}-
                      go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-

            - name: Check formatting
              shell: bash
              run: |
                  test -z "$(gofmt -l .)"

            - name: Go vet
              run: go vet ./...

    test:
        name: Test
        runs-on: ubuntu-latest
        permissions:
            contents: read
            issues: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              id: setup-go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: false

            - name: Cache Go build artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/go-build
                      ~/go/pkg/mod
                  key: go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}-test
                  restore-keys: |
                      go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}-
                      go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-

            - name: Test
              id: test
              shell: bash
              run: |
                  set +e
                  go test -json -coverprofile=coverage.out ./... > test.json
                  echo "exit_code=$?" >> "$GITHUB_OUTPUT"

            - name: Generate test report
              shell: bash
              run: |
                  python3 .github/scripts/go_test_report.py \
                    --test-json test.json \
                    --coverprofile coverage.out \
                    --output test-report.md \
                    --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
                  cat test-report.md >> "$GITHUB_STEP_SUMMARY"

            - name: Comment test report on PR
              if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
              uses: actions/github-script@v7
              with:
                  github-token: ${{ github.token }}
                  script: |
                      const fs = require('fs');
                      const marker = '<!-- ci-report:go -->';
                      const body = `${fs.readFileSync('test-report.md', 'utf8')}\n\n${marker}`;
                      const { owner, repo } = context.repo;
                      const issue_number = context.issue.number;
                      const comments = await github.paginate(github.rest.issues.listComments, {
                        owner,
                        repo,
                        issue_number,
                        per_page: 100,
                      });
                      const existing = comments.find((comment) => comment.body.includes(marker));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner,
                          repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number,
                          body,
                        });
                      }

            - name: Fail if tests failed
              if: steps.test.outputs.exit_code != '0'
              shell: bash
              run: exit 1
