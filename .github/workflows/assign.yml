name: Assign

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ format('{0}-{1}', github.workflow, github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

jobs:
  assign-label:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: [self-hosted, linux, x64, general]
    steps:
      - name: Apply labels from branch and changed files
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import re
          import urllib.request

          token = os.environ["GITHUB_TOKEN"]
          repository = os.environ["REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          head_ref = os.environ["HEAD_REF"]

          def api_request(path: str, *, method: str = "GET", body: dict | None = None):
              request = urllib.request.Request(
                  f"https://api.github.com{path}",
                  method=method,
              )
              request.add_header("Authorization", f"Bearer {token}")
              request.add_header("Accept", "application/vnd.github+json")
              if body is not None:
                  request.add_header("Content-Type", "application/json")
                  payload = json.dumps(body).encode("utf-8")
                  request.data = payload
              with urllib.request.urlopen(request) as response:
                  payload = response.read()
                  if not payload:
                      return None
                  return json.loads(payload)

          def has_suffix(filename: str, suffixes: set[str]) -> bool:
              lower_name = filename.lower()
              return any(lower_name.endswith(suffix) for suffix in suffixes)

          labels: set[str] = set()

          if re.match(r"^(hotfix|fix)", head_ref):
              labels.add("Problem: Bug")
          if re.match(r"^feat", head_ref):
              labels.add("Type: New Feature")
          if re.match(r"^refactor", head_ref):
              labels.add("Type: Improvement")

          changed_files: list[str] = []
          page = 1
          while True:
              batch = api_request(
                  f"/repos/{repository}/pulls/{pr_number}/files?per_page=100&page={page}"
              )
              if not batch:
                  break
              changed_files.extend(item["filename"] for item in batch)
              page += 1

          code_suffixes = {".py", ".js", ".rb", ".go", ".java", ".cpp"}
          database_suffixes = {
              ".sql",
              ".db",
              ".db3",
              ".sqlite",
              ".sqlite3",
              ".psql",
          }
          machine_learning_suffixes = {".ipynb", ".r", ".jl", ".pt", ".onnx"}
          design_suffixes = {".sketch", ".fig", ".xd", ".ai", ".psd"}
          document_suffixes = {".md", ".rst", ".tex", ".pdf"}

          for filename in changed_files:
              if filename.startswith("frontend/"):
                  labels.add("Group: Frontend")
              if filename.startswith("backend/"):
                  labels.add("Group: Backend")
              if has_suffix(filename, database_suffixes):
                  labels.add("Group: Database")
              if has_suffix(filename, machine_learning_suffixes):
                  labels.add("Group: Machine Learning")
              if (
                  filename.startswith("terraform/")
                  or filename == "Dockerfile"
                  or filename.startswith("docker/")
                  or filename.startswith("k8s/")
                  or filename.startswith("kubernetes/")
                  or has_suffix(filename, {".tf", ".tfvars"})
              ):
                  labels.add("Group: Infrastructure")
              if has_suffix(filename, design_suffixes):
                  labels.add("Type: Design")
              if has_suffix(filename, document_suffixes):
                  labels.add("Type: Document")
              if has_suffix(filename, code_suffixes):
                  labels.add("Type: Improvement")
                  labels.add("Priority: Mid")
              if has_suffix(filename, {".md", ".txt"}):
                  labels.add("Feedback: Feature Request")

          if not labels:
              print("No labels matched.")
              raise SystemExit(0)

          api_request(
              f"/repos/{repository}/issues/{pr_number}/labels",
              method="POST",
              body={"labels": sorted(labels)},
          )
          print("Applied labels:", ", ".join(sorted(labels)))
          PY

  sync-labels:
    permissions:
      issues: write
      contents: read
      pages: write
      id-token: write
    runs-on: [self-hosted, linux, x64, general]
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "20.12.2"
      - name: Download labels definition
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LABELS_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.github/labels/labels.json?ref=${LABELS_REF}" \
            -o labels.json
      - name: Run github-label-setup
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx @azu/github-label-setup --token "$GITHUB_TOKEN" --labels labels.json --dryRun false

  assign-author:
    if: ${{ github.event_name == 'pull_request' && ! contains(fromJson('["renovate[bot]", "dependabot[bot]"]'), github.actor) }}
    permissions:
      issues: write
      pull-requests: write
    runs-on: [self-hosted, linux, x64, general]
    steps:
      - uses: technote-space/assign-author@v1

  assign-review:
    permissions:
      pull-requests: write
      contents: read
    runs-on: [self-hosted, linux, x64, general]
    steps:
      - name: Request review
        if: ${{ github.event_name == 'pull_request' }}
        uses: necojackarc/auto-request-review@v0.13.0
        with:
          config: .github/labels/reviewers.yml
          token: ${{ secrets.GITHUB_TOKEN }}
