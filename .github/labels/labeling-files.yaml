# Label: Group Tag
'Group: Frontend':
    - changed-files:
          - any-glob-to-any-file: ['frontend/**']
'Group: Backend':
    - changed-files:
          - any-glob-to-any-file: ['backend/**']
'Group: Database':
    - changed-files:
          - any-glob-to-any-file:
                [
                    '**/*.sql',
                    '**/*.db',
                    '**/*.db3',
                    '**/*.sqlite',
                    '**/*.sqlite3',
                    '**/*.psql',
                ]
'Group: Machine Learning':
    - changed-files:
          - any-glob-to-any-file:
                ['**/*.ipynb', '**/*.r', '**/*.jl', '**/*.pt', '**/*.onnx']
'Group: Infrastructure':
    - changed-files:
          - any-glob-to-any-file:
                [
                    'terraform/**',
                    'Dockerfile',
                    'docker/**',
                    'k8s/**',
                    'kubernetes/**',
                    '**/*.tf',
                    '**/*.tfvars',
                ]

# Label: Type Tag
'Type: Design':
    - changed-files:
          - any-glob-to-any-file:
                ['**/*.sketch', '**/*.fig', '**/*.xd', '**/*.ai', '**/*.psd']
'Type: Document':
    - changed-files:
          - any-glob-to-any-file:
                ['**/*.md', '**/*.rst', '**/*.tex', '**/*.pdf']
'Type: Improvement':
    - changed-files:
          - any-glob-to-any-file:
                [
                    '**/*.py',
                    '**/*.js',
                    '**/*.rb',
                    '**/*.go',
                    '**/*.java',
                    '**/*.cpp',
                ]
