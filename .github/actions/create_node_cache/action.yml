name: Create Cache
description: Cache Node.js version and pnpm store for the frontend.
inputs:
  node-version:
    description: Node.js version to use.
    required: true
  target-directory:
    description: Target directory for caching dependencies.
    required: true
runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Cache Node.js version
      uses: actions/cache@v5
      with:
        path: ~/.nvm/versions/node/
        key: node-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('frontend/.node-version') }}
        restore-keys: |
          node-${{ runner.os }}-${{ inputs.node-version }}-

    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack pnpm
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@10.19.0 --activate

    - name: Get pnpm store directory
      shell: bash
      run: |
        STORE_PATH="$(pnpm store path --silent)"
        mkdir -p "$STORE_PATH"
        echo "STORE_PATH=${STORE_PATH}" >> $GITHUB_ENV

    - name: Cache pnpm store
      uses: actions/cache@v5
      with:
        path: ${{ env.STORE_PATH }}
        key: pnpm-store-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles(format('{0}/pnpm-lock.yaml', inputs.target-directory)) }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-${{ inputs.node-version }}-
